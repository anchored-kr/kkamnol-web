<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kkamnol Interactive — 놀랄 만큼 재미있는 인터랙티브</title>
    <meta
      name="description"
      content="Kkamnol Interactive(깜놀)는 바이럴 미니게임과 플레이어블 광고를 만드는 인터랙티브 스튜디오입니다."
    />
    <link rel="canonical" href="https://kkamnol.xyz/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kkamnol.xyz/" />
    <meta property="og:title" content="Kkamnol Interactive" />
    <meta property="og:description" content="놀랄 만큼 재미있는 인터랙티브를 만듭니다." />
    <meta property="og:image" content="https://kkamnol.xyz/og.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="theme-color" content="#faf7f5" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😮</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,800;1,800;1,900&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand__mark">😮</span>
        <span class="brand__name">kkamnol</span>
      </a>
      <nav class="nav">
        <a href="https://www.instagram.com/kkamnol.interactive/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.tiktok.com/@kkamnol.interactive" target="_blank" rel="noopener">TikTok</a>
        <a class="nav__cta" href="#contactOverlay" data-contact-open>협업 문의</a>
      </nav>
    </header>

    <main class="hero">
      <p class="eyebrow">Interactive Game Studio</p>
      <h1 class="hero__title">Make them<br />go <span class="emoji">😮</span></h1>
      <p class="hero__sub">
        놀랄 만큼 재미있는 인터랙티브.<br />
        미니게임으로 바이럴을, 브랜드에는 플레이어블 광고를.
      </p>
      <div class="hero__actions">
        <a class="btn btn--primary" href="#contactOverlay" data-contact-open>브랜드 협업 문의 →</a>
      </div>

      <section id="works" class="cluster-wrap">
        <div id="cards" class="cluster"><!-- games.js 렌더 --></div>
      </section>
    </main>

    <!-- 브랜드 협업 문의 — 버튼 클릭 시 열리는 모달(평소엔 숨김) -->
    <div id="contactOverlay" class="contact-overlay" hidden>
      <div class="contact-overlay__backdrop" data-contact-close></div>
      <div class="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contactTitle">
        <button class="contact-modal__close" type="button" aria-label="닫기" data-contact-close>✕</button>
        <p class="eyebrow">Work with us</p>
        <h2 id="contactTitle" class="contact__title">브랜드 협업 문의</h2>
        <p class="contact__sub">
          브랜디드 미니게임 · 플레이어블 광고 · 게이미피케이션 캠페인 —<br />
          만들고 싶은 걸 편하게 들려주세요. 보통 1~2영업일 안에 답장드려요.
        </p>

        <form
          id="contactForm"
          class="contact-form"
          action="https://formsubmit.co/contact@anchored.kr"
          method="POST"
        >
          <!-- FormSubmit 설정 -->
          <input type="hidden" name="_subject" value="[kkamnol.xyz] 새 브랜드 협업 문의" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://kkamnol.xyz/?sent=1" />
          <!-- 스팸봇 트랩(사람에겐 안 보임) -->
          <input type="text" name="_honey" class="contact-form__honey" tabindex="-1" autocomplete="off" aria-hidden="true" />

          <div class="contact-form__row">
            <label class="field">
              <span class="field__label">이름 · 회사</span>
              <input type="text" name="이름·회사" required placeholder="홍길동 / 브랜드명" />
            </label>
            <label class="field">
              <span class="field__label">이메일</span>
              <input type="email" name="이메일" required placeholder="you@company.com" />
            </label>
          </div>

          <label class="field">
            <span class="field__label">문의 유형</span>
            <select name="문의유형">
              <option>브랜디드 미니게임</option>
              <option>플레이어블 광고 제작</option>
              <option>게이미피케이션 캠페인</option>
              <option>기타 · 아직 잘 모르겠어요</option>
            </select>
          </label>

          <label class="field">
            <span class="field__label">내용</span>
            <textarea
              name="내용"
              rows="5"
              required
              placeholder="어떤 걸 만들고 싶으신가요? 일정·예산 범위가 있다면 함께 적어주시면 좋아요."
            ></textarea>
          </label>

          <button class="btn btn--primary contact-form__submit" type="submit">문의 보내기 →</button>
          <p class="contact-form__status" role="status" aria-live="polite" hidden></p>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      <span>© 2026 Kkamnol Interactive</span>
      <span class="site-footer__links">
        <a href="https://www.instagram.com/kkamnol.interactive/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.tiktok.com/@kkamnol.interactive" target="_blank" rel="noopener">TikTok</a>
        <a href="#contactOverlay" data-contact-open>Contact</a>
      </span>
    </footer>

    <!-- 데스크톱: 게임을 폰 목업 안에서 미리보기 (아래에서 올라옴) -->
    <div id="phoneOverlay" class="phone-overlay" hidden>
      <div class="phone-backdrop"></div>
      <a class="phone-fullscreen" target="_blank" rel="noopener">전체화면 ↗</a>
      <button class="phone-close" type="button" aria-label="닫기">✕</button>
      <div class="phone">
        <div class="phone-device">
          <span class="phone-btn vol1"></span>
          <span class="phone-btn vol2"></span>
          <span class="phone-btn pwr"></span>
          <div class="phone-island"></div>
          <div class="phone-screen">
            <iframe class="phone-frame" title="게임 미리보기" allow="autoplay"></iframe>
          </div>
        </div>
      </div>
    </div>

    <script src="/games.js" defer></script>
    <script src="/contact.js" defer></script>
  </body>
</html>
