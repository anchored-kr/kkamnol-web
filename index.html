<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kkamnol Interactive — 놀랄 만큼 재미있는 인터랙티브</title>
    <meta
      name="description"
      content="Kkamnol Interactive(깜놀)는 바이럴 미니게임과 플레이어블 광고를 만드는 인터랙티브 스튜디오입니다."
    />
    <link rel="canonical" href="https://kkamnol.xyz/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kkamnol.xyz/" />
    <meta property="og:title" content="Kkamnol Interactive" />
    <meta property="og:description" content="놀랄 만큼 재미있는 인터랙티브를 만듭니다." />
    <meta property="og:image" content="https://kkamnol.xyz/og.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="theme-color" content="#faf7f5" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>😮</text></svg>" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,800;1,800;1,900&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand__mark">😮</span>
        <span class="brand__name">kkamnol</span>
      </a>
      <nav class="nav">
        <a href="https://www.instagram.com/kkamnol.interactive/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.tiktok.com/@kkamnol.interactive" target="_blank" rel="noopener">TikTok</a>
        <a class="nav__cta" href="mailto:hello@kkamnol.xyz">협업 문의</a>
      </nav>
    </header>

    <main class="hero">
      <p class="eyebrow">Interactive Game Studio</p>
      <h1 class="hero__title">Make them<br />go <span class="emoji">😮</span></h1>
      <p class="hero__sub">
        놀랄 만큼 재미있는 인터랙티브.<br />
        미니게임으로 바이럴을, 브랜드에는 플레이어블 광고를.
      </p>
      <div class="hero__actions">
        <a class="btn btn--primary" href="mailto:hello@kkamnol.xyz">브랜드 협업 문의 →</a>
      </div>

      <section id="works" class="cluster-wrap">
        <div id="cards" class="cluster"><!-- games.js 렌더 --></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Kkamnol Interactive</span>
      <span class="site-footer__links">
        <a href="https://www.instagram.com/kkamnol.interactive/" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.tiktok.com/@kkamnol.interactive" target="_blank" rel="noopener">TikTok</a>
        <a href="mailto:hello@kkamnol.xyz">Contact</a>
      </span>
    </footer>

    <!-- 데스크톱: 게임을 폰 목업 안에서 미리보기 (아래에서 올라옴) -->
    <div id="phoneOverlay" class="phone-overlay" hidden>
      <div class="phone-backdrop"></div>
      <a class="phone-fullscreen" target="_blank" rel="noopener">전체화면 ↗</a>
      <button class="phone-close" type="button" aria-label="닫기">✕</button>
      <div class="phone">
        <div class="phone-device">
          <span class="phone-btn vol1"></span>
          <span class="phone-btn vol2"></span>
          <span class="phone-btn pwr"></span>
          <div class="phone-island"></div>
          <iframe class="phone-screen" title="게임 미리보기" allow="autoplay"></iframe>
        </div>
      </div>
    </div>

    <script src="/games.js" defer></script>
  </body>
</html>
