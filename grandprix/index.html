<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>깜놀 그랑프리 — Kkamnol</title>
    <meta name="description" content="당신이 출연자. 전광판 사진에 한 줄 평으로 깜놀을 노려라. 깜놀 그랑프리." />
    <meta name="theme-color" content="#0a0d0a" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,800;1,900&family=Noto+Sans+KR:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/grandprix/grandprix.css" />
    <script type="importmap">
      { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
    </script>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="flash"></div>
    <div id="confetti"></div>

    <div class="hud">
      <div class="topbar">
        <a class="exit" href="/">← 나가기</a>
        <div class="title">깜놀 그랑프리</div>
        <div class="topright">
          <span class="block">A블록 · 3번째</span>
          <button id="mute" class="mute" aria-label="소리 켜기/끄기">🔊</button>
        </div>
      </div>

      <div id="prompt" class="prompt" hidden>사진 한 줄 평</div>

      <div id="startScreen" class="startscreen">
        <div class="start-title">깜놀 그랑프리</div>
        <p class="start-sub">사진 한 줄 평 · 당신이 출연자</p>
        <div class="start-form">
          <input id="nick" class="start-input" maxlength="8" placeholder="닉네임" autocomplete="off" />
          <select id="nat" class="start-select" aria-label="국적">
            <option value="🇰🇷|한국">🇰🇷 한국</option>
            <option value="🇺🇸|미국">🇺🇸 미국</option>
            <option value="🇯🇵|일본">🇯🇵 일본</option>
            <option value="🇨🇳|중국">🇨🇳 중국</option>
            <option value="🇹🇼|대만">🇹🇼 대만</option>
            <option value="🇬🇧|영국">🇬🇧 영국</option>
            <option value="🇫🇷|프랑스">🇫🇷 프랑스</option>
            <option value="🇩🇪|독일">🇩🇪 독일</option>
            <option value="🇪🇸|스페인">🇪🇸 스페인</option>
            <option value="🇮🇹|이탈리아">🇮🇹 이탈리아</option>
            <option value="🇧🇷|브라질">🇧🇷 브라질</option>
            <option value="🇲🇽|멕시코">🇲🇽 멕시코</option>
            <option value="🇮🇳|인도">🇮🇳 인도</option>
            <option value="🇮🇩|인도네시아">🇮🇩 인도네시아</option>
            <option value="🇻🇳|베트남">🇻🇳 베트남</option>
            <option value="🇹🇭|태국">🇹🇭 태국</option>
            <option value="🇵🇭|필리핀">🇵🇭 필리핀</option>
            <option value="🇨🇦|캐나다">🇨🇦 캐나다</option>
            <option value="🇦🇺|호주">🇦🇺 호주</option>
            <option value="🌍|기타">🌍 기타</option>
          </select>
        </div>
        <button id="startBtn" class="btn btn--primary start-btn" disabled>▶ 시작하기</button>
        <p class="start-hint">🔊 소리 켜고 플레이하세요</p>
      </div>

      <div id="suspense" class="suspense" hidden>심사 중…</div>
      <div id="bigboard" class="bigboard" hidden>깜놀! 🎉</div>

      <section id="play" class="bottombar" hidden>
        <form id="form" autocomplete="off">
          <input id="caption" maxlength="40" placeholder="전광판 사진에 한 마디…" />
          <button type="submit" class="btn btn--primary">답변! →</button>
        </form>
      </section>

      <section id="result" class="resultbar" hidden>
        <p class="mycap" id="myCaption"></p>
        <div class="legends">
          <h3>레전드 답안 TOP3</h3>
          <ol id="legendList"></ol>
        </div>
        <div class="actions">
          <button id="share" class="btn btn--primary">결과 공유</button>
          <button id="retry" class="btn btn--ghost">다시 도전</button>
        </div>
      </section>
    </div>

    <script type="module" src="/grandprix/grandprix.js"></script>
  </body>
</html>
